name: Site build check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Astro build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - name: Copy fixture data for build check
        run: |
          mkdir -p public/data/line
          cp ../tests/fixtures/site_data/index.json public/data/index.json
          cp ../tests/fixtures/site_data/feed_health.json public/data/feed_health.json

      - name: Build
        run: npm run build
