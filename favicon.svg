<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="Sofia On Time icon">
  <title>Sofia On Time</title>

  <!-- Outer ring — clock face / transit-route boundary -->
  <circle cx="40" cy="40" r="32" stroke="#1A365D" stroke-width="2.5" opacity="0.2"/>

  <!-- Navy hand (~10 o'clock) -->
  <line x1="40" y1="40" x2="24" y2="18" stroke="#1A365D" stroke-width="5" stroke-linecap="round"/>
  <circle cx="24" cy="18" r="3.5" fill="#1A365D"/>

  <!-- Gold hand (~2 o'clock) -->
  <line x1="40" y1="40" x2="62" y2="22" stroke="#D6922B" stroke-width="5" stroke-linecap="round"/>
  <circle cx="62" cy="22" r="3.5" fill="#D6922B"/>
</svg>
