<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100" fill="none" role="img" aria-label="Sofia On Time logo">
  <title>Sofia On Time</title>

  <!-- === Mark: clock face + transit route hands at 10:10 === -->

  <!-- Outer ring — clock face / transit-route boundary -->
  <circle cx="55" cy="50" r="42" stroke="#1A365D" stroke-width="2.5" opacity="0.18"/>

  <!-- Navy hand — hour hand at ~10 o'clock (shorter) -->
  <line x1="55" y1="50" x2="34" y2="18" stroke="#1A365D" stroke-width="6" stroke-linecap="round"/>
  <circle cx="34" cy="18" r="4" fill="#1A365D"/>

  <!-- Gold hand — minute hand at ~2 o'clock (longer) -->
  <line x1="55" y1="50" x2="82" y2="24" stroke="#D6922B" stroke-width="6" stroke-linecap="round"/>
  <circle cx="82" cy="24" r="4" fill="#D6922B"/>

  <!-- === Wordmark === -->
  <text x="120" y="44"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="700" fill="#1A1A2E" letter-spacing="-0.5">Sofia</text>
  <text x="120" y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="23" font-weight="500" fill="#5A6B7E" letter-spacing="0.5">On Time</text>
</svg>
